services:
  postgres:
    image: postgres:15
    container_name: actionlens-postgres
    restart: always
    environment:
      POSTGRES_USER: actionlens
      POSTGRES_PASSWORD: actionlens123
      POSTGRES_DB: actionlens_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: actionlens-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data: